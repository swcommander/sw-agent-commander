workflows:
  android-build:
    name: Android Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      android_signing:
        - dummy_keystore
      groups:
        - default
      vars:
        PACKAGE_NAME: "com.swagent.commander"
    scripts:
      - name: Build APK
        script: |
          cd app
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
